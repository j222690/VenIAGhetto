<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark only" />
    <title>Confirme seu e-mail</title>
  </head>
  <body style="margin:0;padding:0;background:#0B0D16;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0B0D16;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#141622;border:1px solid #262a3d;border-radius:24px;overflow:hidden;">
            <tr>
              <td align="center" style="padding:40px 32px 8px;">
                <div style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#FF37B6;font-weight:700;">Vest · IA</div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 8px;">
                <h1 style="font-size:24px;font-weight:700;color:#F4F5F9;margin:0 0 12px;text-align:center;">Confirme seu e-mail</h1>
                <p style="font-size:15px;line-height:1.6;color:#A3A6B8;margin:0;text-align:center;">
                  Falta só um passo para ativar sua conta. Toque no botão abaixo para confirmar seu e-mail.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:24px 32px 8px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#FF37B6;color:#0B0D16;text-decoration:none;font-size:15px;font-weight:700;padding:14px 32px;border-radius:999px;">
                  Confirmar e-mail
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 8px;">
                <p style="font-size:12px;line-height:1.6;color:#6E7186;margin:0;text-align:center;">
                  Se o botão não funcionar, copie e cole este link no navegador:<br />
                  <a href="{{ .ConfirmationURL }}" style="color:#FF37B6;word-break:break-all;">{{ .ConfirmationURL }}</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 32px 40px;border-top:1px solid #262a3d;margin-top:16px;">
                <p style="font-size:11px;line-height:1.6;color:#6E7186;margin:16px 0 0;text-align:center;">
                  Se você não criou uma conta no Vest IA, ignore este e-mail.
                </p>
              </td>
            </tr>
          </table>
          <p style="font-size:11px;color:#6E7186;margin:16px 0 0;">© Vest IA</p>
        </td>
      </tr>
    </table>
  </body>
</html>
